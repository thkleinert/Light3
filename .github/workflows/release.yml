name: Build and attach release artifact

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: signing-helper-go/go.mod

      - name: Build universal binary
        run: |
          cd signing-helper-go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/light3-sign-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/light3-sign-x64 .
          lipo -create -output dist/light3-sign dist/light3-sign-arm64 dist/light3-sign-x64
          chmod +x dist/light3-sign

      - name: Bundle plugin
        run: |
          cp signing-helper-go/dist/light3-sign light3.lrplugin/light3-sign
          VERSION="${{ github.event.release.tag_name }}"
          zip -r "light3-${VERSION}.lrplugin.zip" light3.lrplugin

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: light3-*.lrplugin.zip
